name: Privesc Method 59 - CodeBuild StartBuildBatch
description: Creates CAN_PRIVESC relationship when a principal can start batch builds on CodeBuild projects with privileged service roles
impactedServices:
  - CodeBuild
severity: High
order: 156
cypher: |
  MATCH (principal)-[:CODEBUILD_STARTBUILDBATCH]->(project:AWS_CodeBuild_Project)
  WHERE principal.admin IS NULL
    AND project.Role IS NOT NULL

  // Match the actual role by ARN
  MATCH (serviceRole:AWS_IAM_Role {arn: project.Role})

  // Create the privesc relationship to the project's service role
  MERGE (principal)-[privesc:CAN_PRIVESC]->(serviceRole)
  ON CREATE SET
    privesc.method = "Method-59-CodeBuild-StartBuildBatch",
    privesc.requires = ["codebuild:StartBuildBatch"],
    privesc.service = "CodeBuild",
    privesc.targetType = "Role",
    privesc.projectName = project.name
  ON MATCH SET
    privesc.method = CASE
      WHEN NOT privesc.method CONTAINS "Method-59-CodeBuild-StartBuildBatch"
      THEN privesc.method + ",Method-59-CodeBuild-StartBuildBatch"
      ELSE privesc.method
    END,
    privesc.projectName = CASE
      WHEN privesc.projectName IS NULL THEN project.name
      WHEN NOT privesc.projectName CONTAINS project.name THEN privesc.projectName + "," + project.name
      ELSE privesc.projectName
    END
