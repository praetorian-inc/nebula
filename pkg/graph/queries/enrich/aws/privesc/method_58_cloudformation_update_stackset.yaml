name: Privesc Method 58 - CloudFormation UpdateStackSet
description: Creates CAN_PRIVESC relationship when a principal can pass roles to CloudFormation and update stack sets
impactedServices:
  - IAM
  - CloudFormation
severity: High
order: 155
cypher: |
  MATCH (principal)-[:IAM_PASSROLE]->(targetRole:AWS_IAM_Role)
  WHERE principal.admin IS NULL
    AND 'cloudformation.amazonaws.com' IN targetRole.trustedServices
    AND EXISTS((principal)-[:CLOUDFORMATION_UPDATESTACKSET]->())

  // Create the privesc relationship
  MERGE (principal)-[privesc:CAN_PRIVESC]->(targetRole)
  ON CREATE SET
    privesc.method = "Method-58-CloudFormation-UpdateStackSet",
    privesc.requires = ["iam:PassRole", "cloudformation:UpdateStackSet"],
    privesc.service = "CloudFormation",
    privesc.targetType = "Role"
  ON MATCH SET
    privesc.method = CASE
      WHEN NOT privesc.method CONTAINS "Method-58-CloudFormation-UpdateStackSet"
      THEN privesc.method + ",Method-58-CloudFormation-UpdateStackSet"
      ELSE privesc.method
    END
