name: Privesc Method 47 - ECS PassRole CreateCluster CreateService
description: Creates CAN_PRIVESC relationship when a principal can create an ECS cluster, register a task definition with a privileged role, and launch a service
impactedServices:
  - IAM
  - ECS
severity: High
order: 144
cypher: |
  MATCH (principal)-[:IAM_PASSROLE]->(targetRole:AWS_IAM_Role)
  WHERE principal.admin IS NULL
    AND EXISTS((principal)-[:ECS_CREATECLUSTER]->())
    AND EXISTS((principal)-[:ECS_REGISTERTASKDEFINITION]->())
    AND EXISTS((principal)-[:ECS_CREATESERVICE]->())
    AND 'ecs-tasks.amazonaws.com' IN targetRole.trustedServices

  // Create the privesc relationship
  MERGE (principal)-[privesc:CAN_PRIVESC]->(targetRole)
  ON CREATE SET
    privesc.method = "Method-47-ECS-PassRole-CreateCluster-CreateService",
    privesc.requires = ["iam:PassRole", "ecs:CreateCluster", "ecs:RegisterTaskDefinition", "ecs:CreateService"],
    privesc.service = "ECS",
    privesc.targetType = "Role"
  ON MATCH SET
    privesc.method = CASE
      WHEN NOT privesc.method CONTAINS "Method-47-ECS-PassRole-CreateCluster-CreateService"
      THEN privesc.method + ",Method-47-ECS-PassRole-CreateCluster-CreateService"
      ELSE privesc.method
    END
