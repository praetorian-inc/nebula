name: Privesc Method 44 - ECS ExecuteCommand
description: Creates CAN_PRIVESC relationship when a principal can execute commands in ECS tasks and describe tasks
impactedServices:
  - ECS
severity: High
order: 141
cypher: |
  MATCH (principal)-[:ECS_EXECUTECOMMAND]->(target)
  WHERE principal.admin IS NULL
    AND EXISTS((principal)-[:ECS_DESCRIBETASKS]->())

  // Scope through running tasks with ExecuteCommand enabled
  WITH principal, target
  MATCH (task:AWS_ECS_Task)-[:BELONGS_TO]->(taskDef:AWS_ECS_TaskDefinition)
        -[:STS_ASSUMEROLE]->(targetRole:AWS_IAM_Role)
  WHERE task.EnableExecuteCommand = true
    AND (
      // Cluster-scoped: only tasks in reachable cluster
      (target:AWS_ECS_Cluster AND EXISTS((task)-[:BELONGS_TO]->(target)))
      OR
      // Wildcard (service principal target): match all running tasks
      (NOT target:AWS_ECS_Cluster)
    )

  // Create the privesc relationship
  MERGE (principal)-[privesc:CAN_PRIVESC]->(targetRole)
  ON CREATE SET
    privesc.method = "Method-44-ECS-ExecuteCommand",
    privesc.requires = ["ecs:ExecuteCommand", "ecs:DescribeTasks"],
    privesc.service = "ECS",
    privesc.targetType = "Role"
  ON MATCH SET
    privesc.method = CASE
      WHEN NOT privesc.method CONTAINS "Method-44-ECS-ExecuteCommand"
      THEN privesc.method + ",Method-44-ECS-ExecuteCommand"
      ELSE privesc.method
    END
