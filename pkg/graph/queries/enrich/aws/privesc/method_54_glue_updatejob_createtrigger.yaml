name: Privesc Method 54 - Glue UpdateJob + CreateTrigger
description: Creates CAN_PRIVESC relationship when a principal can update existing Glue jobs with privileged service roles and create auto-start triggers to execute them
impactedServices:
  - IAM
  - Glue
severity: High
order: 151
cypher: |
  MATCH (principal)-[:IAM_PASSROLE]->(targetRole:AWS_IAM_Role)
  WHERE principal.admin IS NULL
    AND 'glue.amazonaws.com' IN targetRole.trustedServices
    AND EXISTS((principal)-[:GLUE_UPDATEJOB]->())
    AND EXISTS((principal)-[:GLUE_CREATETRIGGER]->())

  // Create the privesc relationship
  MERGE (principal)-[privesc:CAN_PRIVESC]->(targetRole)
  ON CREATE SET
    privesc.method = "Method-54-Glue-UpdateJob-CreateTrigger",
    privesc.requires = ["iam:PassRole", "glue:UpdateJob", "glue:CreateTrigger"],
    privesc.service = "Glue",
    privesc.targetType = "Role"
  ON MATCH SET
    privesc.method = CASE
      WHEN NOT privesc.method CONTAINS "Method-54-Glue-UpdateJob-CreateTrigger"
      THEN privesc.method + ",Method-54-Glue-UpdateJob-CreateTrigger"
      ELSE privesc.method
    END
