name: Privesc Method 62 - EC2 RequestSpotInstances
description: Creates CAN_PRIVESC relationship when a principal can pass roles to EC2 instances via spot instance requests
impactedServices:
  - IAM
  - EC2
severity: High
order: 159
cypher: |
  MATCH (principal)-[:IAM_PASSROLE]->(targetRole:AWS_IAM_Role)
  WHERE principal.admin IS NULL
    AND EXISTS((principal)-[:EC2_REQUESTSPOTINSTANCES]->())
    AND 'ec2.amazonaws.com' IN targetRole.trustedServices
    AND targetRole.instanceProfileList IS NOT NULL
    AND targetRole.instanceProfileList <> '[]'

  // Create the privesc relationship
  MERGE (principal)-[privesc:CAN_PRIVESC]->(targetRole)
  ON CREATE SET
    privesc.method = "Method-62-EC2-RequestSpotInstances",
    privesc.requires = ["iam:PassRole", "ec2:RequestSpotInstances"],
    privesc.service = "EC2",
    privesc.targetType = "Role"
  ON MATCH SET
    privesc.method = CASE
      WHEN NOT privesc.method CONTAINS "Method-62-EC2-RequestSpotInstances"
      THEN privesc.method + ",Method-62-EC2-RequestSpotInstances"
      ELSE privesc.method
    END
