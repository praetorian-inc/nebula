name: Privesc Method 51 - Glue CreateJob + StartJobRun
description: Creates CAN_PRIVESC relationship when a principal can create Glue jobs with privileged service roles and start them
impactedServices:
  - IAM
  - Glue
severity: High
order: 148
cypher: |
  MATCH (principal)-[:IAM_PASSROLE]->(targetRole:AWS_IAM_Role)
  WHERE principal.admin IS NULL
    AND 'glue.amazonaws.com' IN targetRole.trustedServices
    AND EXISTS((principal)-[:GLUE_CREATEJOB]->())
    AND EXISTS((principal)-[:GLUE_STARTJOBRUN]->())

  // Create the privesc relationship
  MERGE (principal)-[privesc:CAN_PRIVESC]->(targetRole)
  ON CREATE SET
    privesc.method = "Method-51-Glue-CreateJob-StartJobRun",
    privesc.requires = ["iam:PassRole", "glue:CreateJob", "glue:StartJobRun"],
    privesc.service = "Glue",
    privesc.targetType = "Role"
  ON MATCH SET
    privesc.method = CASE
      WHEN NOT privesc.method CONTAINS "Method-51-Glue-CreateJob-StartJobRun"
      THEN privesc.method + ",Method-51-Glue-CreateJob-StartJobRun"
      ELSE privesc.method
    END
